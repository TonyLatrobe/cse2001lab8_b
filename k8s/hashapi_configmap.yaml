# `k8s/hashapi.yaml`

# Three Kubernetes resources in one file. The source `ConfigMap` embeds `server.py` and `hash_service.py` directly — the Deployment mounts it at `/app` and overrides the container command. No custom image build, no internet access.

# k8s/hashapi.yaml
# Deliberately compliant with all 8 OPA rules:
#   R1 ✅  runAsUser: 1000 (not root)
#   R2 ✅  resources.limits declared
#   R3 ✅  resources.requests declared
#   R4 ✅  image pinned to :lab (not :latest)
#   R5 ✅  allowPrivilegeEscalation: false
#   R6 ✅  readinessProbe defined (GET /health)
#   R7 ✅  livenessProbe defined  (GET /health)
#   R8 ✅  team: platform label on pod template

# ConfigMap carries the full application source.
# kubectl apply updates this ConfigMap; the pod reads new code on next restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: hash-api-source
  namespace: staging
  labels:
    app: hash-api
    team: platform
data:
  hash_service.py: |
    import hashlib

    SUPPORTED_ALGORITHMS = {"md5", "sha1", "sha256", "sha512"}

    def compute_hash(algorithm: str, data: str) -> str:
        if algorithm not in SUPPORTED_ALGORITHMS:
            raise ValueError(
                f"Unsupported algorithm '{algorithm}'. "
                f"Supported: {sorted(SUPPORTED_ALGORITHMS)}"
            )
        h = hashlib.new(algorithm)
        h.update(data.encode("utf-8"))
        return h.hexdigest()

    def supported_algorithms() -> list:
        return sorted(SUPPORTED_ALGORITHMS)

  server.py: |
    #!/usr/bin/env python3
    import json, logging, os, sys, urllib.parse
    from http.server import BaseHTTPRequestHandler, HTTPServer, ThreadingHTTPServer
    sys.path.insert(0, "/app")
    from hash_service import compute_hash, supported_algorithms, SUPPORTED_ALGORITHMS

    PORT = int(os.environ.get("PORT", "8080"))
    LOG_LEVEL = os.environ.get("LOG_LEVEL", "INFO").upper()
    logging.basicConfig(stream=sys.stdout, level=getattr(logging, LOG_LEVEL, logging.INFO),
                        format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger("hash-api")

    class HashHandler(BaseHTTPRequestHandler):
        def log_message(self, fmt, *args):
            log.info("%s %s", self.address_string(), fmt % args)

        def _json(self, code, payload):
            body = json.dumps(payload).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            parsed = urllib.parse.urlparse(self.path)
            qs = urllib.parse.parse_qs(parsed.query)
            if parsed.path == "/health":
                self._json(200, {"status": "ok", "service": "hash-api"})
            elif parsed.path == "/algorithms":
                self._json(200, {"algorithms": supported_algorithms()})
            elif parsed.path == "/hash":
                algo = qs.get("algorithm", ["sha256"])[0]
                data = qs.get("data", [""])[0]
                try:
                    self._json(200, {"algorithm": algo, "hash": compute_hash(algo, data), "input": data})
                except ValueError as e:
                    self._json(400, {"error": str(e)})
            else:
                self._json(404, {"error": "not found", "path": parsed.path})

        def do_POST(self):
            if urllib.parse.urlparse(self.path).path != "/hash":
                self._json(404, {"error": "not found"}); return
            length = int(self.headers.get("Content-Length", 0))
            try:
                payload = json.loads(self.rfile.read(length))
            except (json.JSONDecodeError, ValueError):
                self._json(400, {"error": "invalid JSON body"}); return
            algo = payload.get("algorithm", "sha256")
            data = payload.get("data", "")
            try:
                self._json(200, {"algorithm": algo, "hash": compute_hash(algo, data), "input": data})
            except ValueError as e:
                self._json(400, {"error": str(e)})

    if __name__ == "__main__":
        server = ThreadingHTTPServer(("0.0.0.0", PORT), HashHandler)
        log.info("Hash API (threaded) listening on :%d", PORT)
        server.serve_forever()